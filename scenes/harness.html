<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    html, body { margin: 0; padding: 0; background: #000; }
    #stage { position: relative; overflow: hidden; }
    #overlay { position: absolute; inset: 0; pointer-events: none; }
    canvas { display: block; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "/node_modules/three/build/three.module.js",
      "three/addons/": "/node_modules/three/examples/jsm/",
      "gsap": "/node_modules/gsap/index.js",
      "gsap/MorphSVGPlugin": "/node_modules/gsap/MorphSVGPlugin.js",
      "gsap/DrawSVGPlugin": "/node_modules/gsap/DrawSVGPlugin.js",
      "gsap/SplitText": "/node_modules/gsap/SplitText.js",
      "lottie-web": "/node_modules/lottie-web/build/player/esm/lottie.min.js"
    }
  }
  </script>
</head>
<body>
  <div id="stage"><div id="overlay"></div></div>
<script type="module">
// VERA render harness.
// Loads three.js + studio IBL once, mounts the WebGL canvas under an HTML/SVG
// overlay inside a fixed-size #stage, dynamically loads a scene by ?scene=<id>,
// and exposes a deterministic render API + a DOM probe to the Node runtime.
import * as THREE from 'three';

const params  = new URLSearchParams(location.search);
const sceneId = params.get('scene') || 'cube';

try {
  const mod  = await import(`./${sceneId}.mjs`);
  // A scene exports a static `meta`, or (for the generic runner) an async
  // `getMeta()` that resolves its config from a storyboard JSON.
  const meta = Object.assign(
    { id: sceneId, frames: 30, fps: 30, width: 640, height: 480, bg: '#ffffff' },
    mod.getMeta ? await mod.getMeta(params) : (mod.meta || {})
  );

  const stage   = document.getElementById('stage');
  const overlay = document.getElementById('overlay');
  stage.style.width  = meta.width + 'px';
  stage.style.height = meta.height + 'px';

  const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
  renderer.setPixelRatio(1);
  renderer.setSize(meta.width, meta.height, false);
  renderer.setClearColor(new THREE.Color(meta.bg), 1);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  stage.insertBefore(renderer.domElement, overlay);   // canvas under overlay

  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(50, meta.width / meta.height, 0.1, 100);
  camera.position.set(0, 0, 5);

  try {
    const { RoomEnvironment } = await import('three/addons/environments/RoomEnvironment.js');
    const pmrem = new THREE.PMREMGenerator(renderer);
    scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
  } catch (e) {
    console.warn('studio env unavailable, metals will look flatter:', e);
  }

  const ctx  = {
    scene, camera, renderer, THREE,
    width: meta.width, height: meta.height,
    frames: meta.frames, overlayRoot: overlay
  };
  const inst = mod.create(THREE, ctx) || {};
  // Scenes that load assets (textures) expose a `ready` promise — await it so the
  // first rendered frame already has its images.
  if (inst.ready) { try { await inst.ready; } catch (e) { console.warn('scene assets failed to load:', e); } }

  // Deterministic API: every frame is a pure function of its index. No rAF, no clocks.
  window.__meta = meta;
  window.renderFrame = (frame) => {
    // Refresh camera matrices BEFORE scene/overlay update so 3D->2D projection
    // (callout anchors) is correct on every frame, including the very first.
    camera.updateMatrixWorld();
    camera.matrixWorldInverse.copy(camera.matrixWorld).invert();
    if (inst.update) inst.update(frame, meta.fps);
    renderer.render(scene, camera);
  };
  // Wait two animation frames so any overlay DOM mutation fully lays out and
  // paints before the driver screenshots — guarantees clean, deterministic capture.
  window.__paint = () => new Promise((r) => requestAnimationFrame(() => requestAnimationFrame(r)));
  window.__probe = () => (inst.probe ? inst.probe() : null);
  window.__ready = true;

  // Live preview mode (?play=1): auto-play a looping animation for the browser.
  // The headless render driver never sets this, so deterministic capture is unaffected.
  if (params.get('play') === '1') {
    const loop = () => {
      const f = Math.floor((performance.now() / 1000) * meta.fps) % meta.frames;
      window.renderFrame(f);
      requestAnimationFrame(loop);
    };
    requestAnimationFrame(loop);
  }
} catch (err) {
  window.__error = String((err && err.stack) || err);
  console.error('harness error:', err);
}
</script>
</body>
</html>
